; clawd-cardputer firmware — M5Stack Cardputer ADV (ESP32-S3FN8, no PSRAM expected)
[env:cardputer-adv]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 8MB
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
; M5Cardputer 1.2.0 is not on the PlatformIO registry (stuck at 1.1.1),
; so pin the GitHub release tag directly.
lib_deps =
    https://github.com/m5stack/M5Cardputer/archive/refs/tags/1.2.0.zip
